version: '3'

services:
  shiny:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: shiny-tool
    ports:
      - "3838:3838"
    volumes:
      - ./shiny-tool:/srv/shiny-server/
      - ./data:/srv/shiny-server/data/:rw
      - ./www:/srv/shiny-server/www/

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - shiny